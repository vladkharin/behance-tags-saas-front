<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 1. Заголовок страницы (Title) — Самое важное для SEO -->
    <title>BeRanked — Аналитика и трекинг тегов на Behance</title>

    <!-- 2. Описание (Description) — То, что люди видят в Google/Яндекс -->
    <meta
      name="description"
      content="BeRanked: Профессиональный инструмент для мониторинга позиций ваших кейсов на Behance. Отслеживайте теги, анализируйте конкурентов и выводите свои работы в ТОП."
    />

    <!-- 3. Ключевые слова -->
    <meta name="keywords" content="Behance analytics, Behance tags tracker, аналитика беханс, продвижение на behance, трекинг тегов" />

    <!-- 4. Open Graph (Для красивого превью ссылки в Telegram, WhatsApp, соцсетях) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BeRanked — Будь в топе Behance" />
    <meta
      property="og:description"
      content="Сервис глубокой аналитики и мониторинга позиций ваших проектов. Узнайте свои реальные места в выдаче."
    />
    <meta property="og:url" content="https://beranked.domcraft.digital/" />
    <meta property="og:image" content="https://beranked.domcraft.digital/og-image.png" />

    <!-- 5. Запрет на индексацию "мусорных" страниц (опционально) -->
    <meta name="robots" content="index, follow" />

    <!-- Шрифты (если используешь Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
